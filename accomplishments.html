<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rescisty — accomplishments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-page.css">
  <style>
    *, *::before, *::after { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        cursor: none !important; 
    }
    .entry {
      animation-delay: calc(0.08s * var(--i));
    }
  </style>
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="page-transition"></div>

  <header id="topbar">
    <a class="wordmark" href="home.html">rescisty</a>
    <a id="back-btn" href="home.html">back</a>
  </header>

  <main id="page-content">
    <div class="page-header">
      <p class="page-label">03 — accomplishments</p>
      <h1 class="page-title">things<br>done</h1>
    </div>

    <div class="entry-list">

      <div class="entry" style="--i:1">
        <span class="entry-year">ongoing</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

      <div class="entry" style="--i:2">
        <span class="entry-year">2026</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

      <div class="entry" style="--i:3">
        <span class="entry-year">2026</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

      <div class="entry" style="--i:4">
        <span class="entry-year">2026</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

      <div class="entry" style="--i:5">
        <span class="entry-year">2026</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

      <div class="entry" style="--i:6">
        <span class="entry-year">2026</span>
        <div>
          <p class="entry-title">N/A</p>
          <p class="entry-desc">N/A</p>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Mark this page as visited
    const readItems = new Set(JSON.parse(localStorage.getItem('readItems') || '[]'));
    readItems.add('accomplishments');
    localStorage.setItem('readItems', JSON.stringify([...readItems]));

    const cursor = document.getElementById('custom-cursor');
    window.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // Cursor expansion on hover for interactive elements
    const interactiveElements = document.querySelectorAll('#back-btn, .wordmark');
    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    // Entrance reveal - add immediately and on visibility change
    function revealPage() {
      document.getElementById('page-transition').classList.add('reveal');
    }
    
    // Reveal on load
    window.addEventListener('load', revealPage);
    
    // Also reveal if page becomes visible (handles back button)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        revealPage();
      }
    });
    
    // Reveal immediately in case it's already loaded
    revealPage();

    // Handle browser back button via bfcache (persisted pages)
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        revealPage();
      }
    });

    document.getElementById('back-btn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('page-transition').classList.remove('reveal');
      setTimeout(() => window.history.back(), 700);
    });

    document.querySelector('.wordmark').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('page-transition').classList.remove('reveal');
      setTimeout(() => window.location.href = 'home.html', 700);
    });
  </script>
</body>
</html>
