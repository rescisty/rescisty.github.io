<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rescisty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      background: #080808;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      cursor: none !important;
    }

    #custom-cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s;
    }

    #custom-cursor.hovering {
      transform: translate(-50%, -50%) scale(2);
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    #door-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      display: flex;
    }

    #door-left, #door-right {
      width: 50%;
      height: 100%;
      background: #080808;
      transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
    }

    #door-overlay.open #door-left {
      transform: translateX(-100%);
    }

    #door-overlay.open #door-right {
      transform: translateX(100%);
    }

    #click-hint {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      padding: 0;
      font-size: 13px;
      font-weight: 300;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.05em;
      line-height: 1;
      cursor: pointer;
      z-index: 100;
      transition: color 0.3s ease;
      pointer-events: auto;
    }

    #click-hint:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    @keyframes pulse-hint {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.6; }
    }

    #click-hint {
      animation: pulse-hint 3s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div id="custom-cursor"></div>
  <canvas id="mainCanvas"></canvas>
  
  <button id="click-hint">click the face<br>
  or me..</button>

  <div id="door-overlay" class="open">
    <div id="door-left"></div>
    <div id="door-right"></div>
  </div>

  <script>
    window.addEventListener('load', function() {
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const cursor = document.getElementById('custom-cursor');

      // Ensure canvas takes full viewport
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let W = canvas.width;
      let H = canvas.height;
      let cx = W / 2;
      let cy = H / 2;

      let mouseX = cx;
      let mouseY = cy;
      let smoothX = cx;
      let smoothY = cy;
      let time = 0;

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        W = canvas.width;
        H = canvas.height;
        cx = W / 2;
        cy = H / 2;
      });

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';
      });

      // Blob points
      const POINTS = 52;
      const RADIUS_X = 112;
      const RADIUS_Y = 112;

      const blobPoints = [];
      for (let i = 0; i < POINTS; i++) {
        blobPoints.push({
          angle: (i / POINTS) * Math.PI * 2,
          phase: Math.random() * Math.PI * 2,
          speed: 0.008 + Math.random() * 0.006
        });
      }

      function getPoint(pt, normalX, normalY) {
        const cos = Math.cos(pt.angle);
        const sin = Math.sin(pt.angle);
        const wave = Math.sin(pt.phase + time) * 1.5 + Math.sin(pt.phase * 1.7 + time * 0.6);
        const dot = cos * normalX + sin * normalY;
        const push = Math.max(0, dot) * 10;
        const r = RADIUS_X + wave + push * 0.4;

        return {
          x: cx + cos * r,
          y: cy + sin * r
        };
      }

      function draw() {
        // Clear completely
        ctx.clearRect(0, 0, W, H);
        
        // Fill background
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, W, H);

        const normX = Math.max(-1, Math.min(1, (smoothX - cx) / (W * 0.5)));
        const normY = Math.max(-1, Math.min(1, (smoothY - cy) / (H * 0.5)));

        // Blob outline
        const firstPt = getPoint(blobPoints[0], normX, normY);
        ctx.beginPath();
        ctx.moveTo(firstPt.x, firstPt.y);

        for (let i = 0; i <= POINTS; i++) {
          const curr = getPoint(blobPoints[i % POINTS], normX, normY);
          const next = getPoint(blobPoints[(i + 1) % POINTS], normX, normY);
          ctx.quadraticCurveTo(curr.x, curr.y, (curr.x + next.x) / 2, (curr.y + next.y) / 2);
        }
        ctx.closePath();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 16;
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Eyes
        const shortX = Math.sqrt(1 - normX * normX * 0.6);
        const shortY = Math.sqrt(1 - normY * normY * 0.4);
        const lookX = normX * 38;
        const lookY = normY * 22;

        const eyeLeft = cx + (-30 * shortX) + lookX;
        const eyeRight = cx + (30 * shortX) + lookX;
        const eyeY = cy + (-16 * shortY) + lookY;

        const leftRadius = Math.max(3, 7 + normX * -1.5);
        const rightRadius = Math.max(3, 7 + normX * 1.5);

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(eyeLeft, eyeY, leftRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(eyeRight, eyeY, rightRadius, 0, Math.PI * 2);
        ctx.fill();

        // Mouth
        const mouthX = cx + lookX * 0.8;
        const mouthY = cy + (34 * shortY) + lookY * 0.7;
        const mouthW = 14 * shortX;
        const mouthH = 14 + Math.abs(normX) * 10 + Math.abs(normY) * 6;

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(mouthX, mouthY, mouthW, mouthH, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      function update() {
        time += 0.018;
        
        for (let pt of blobPoints) {
          pt.phase += pt.speed;
        }

        smoothX += (mouseX - smoothX) * 0.07;
        smoothY += (mouseY - smoothY) * 0.07;

        draw();
        requestAnimationFrame(update);
      }

      document.addEventListener('click', (e) => {
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = (dx * dx) / (RADIUS_X ** 2) + (dy * dy) / (RADIUS_Y ** 2);

        if (dist <= 1.1) {
          document.getElementById('door-overlay').classList.remove('open');
          setTimeout(() => {
            window.location.href = 'home.html';
          }, 1100);
        }
      });

      // Click hint button
      document.getElementById('click-hint').addEventListener('click', () => {
        document.getElementById('door-overlay').classList.remove('open');
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 1100);
      });

      // Draw first frame immediately, then start loop
      draw();
      update();

      // Reset overlay state when using browser back button
      window.addEventListener('popstate', () => {
        document.getElementById('door-overlay').classList.add('open');
      });
    });
  </script>

</body>
</html>
