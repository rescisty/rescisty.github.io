<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rescisty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        cursor: none !important; 
    }

    body {
      background: #080808;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }


    #custom-cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s;
    }

    #custom-cursor.hovering {
      transform: translate(-50%, -50%) scale(3);
    }

    canvas#physicsCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #menu {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .menu-item {
      font-size: clamp(20px, 3vw, 36px);
      font-weight: 200;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.02em;
      padding: 14px 40px;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
      text-decoration: none;
      display: block;
      text-align: center;
      user-select: none;
    }

    .menu-item::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 40px;
      right: 40px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      transform: scaleX(0);
      transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
      transform-origin: left;
    }

    .menu-item:hover {
      color: #ffffff;
    }

    .menu-item:hover::after {
      transform: scaleX(1);
    }

    .menu-item .item-number {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-style: italic;
    }

    #item-secret {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      color: rgba(255,255,255,0.5);
      font-style: italic;
      font-size: clamp(18px, 2.5vw, 30px);
      font-weight: 200;
    }

    #item-secret.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    #wordmark {
      position: fixed;
      top: 36px;
      left: 40px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.2);
      text-transform: lowercase;
      z-index: 20;
    }

    /* Entrance animation */
    .menu-item {
      animation: fadeSlideIn 0.9s cubic-bezier(0.76, 0, 0.24, 1) both;
    }
    .menu-item:nth-child(1) { animation-delay: 0.1s; }
    .menu-item:nth-child(2) { animation-delay: 0.2s; }
    .menu-item:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Page transition */
    #page-transition {
      position: fixed;
      inset: 0;
      background: #080808;
      z-index: 1000;
      transform: translateY(0);
      transition: transform 0.7s cubic-bezier(0.76, 0, 0.24, 1);
    }
    #page-transition.reveal {
      transform: translateY(-100%);
    }
    #page-transition.go {
      transform: translateY(0) !important;
    }
  </style>
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="page-transition"></div>

  <div id="wordmark">rescisty</div>

  <canvas id="physicsCanvas"></canvas>

  <nav id="menu">
    <a class="menu-item" id="item-rescisty" onclick="navigate('rescisty.html')">
      <span class="item-number">01</span>
      rescisty
    </a>
    <a class="menu-item" id="item-about" onclick="navigate('about.html')">
      <span class="item-number">02</span>
      about me
    </a>
    <a class="menu-item" id="item-accomplishments" onclick="navigate('accomplishments.html')">
      <span class="item-number">03</span>
      accomplishments
    </a>
    <a class="menu-item" id="item-secret" onclick="navigate('secret.html')">
      🤫 shh
    </a>
  </nav>

  <script>
    // Cursor
    const cursor = document.getElementById('custom-cursor');
    window.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('.menu-item').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    // Reveal page (lift black screen)
    function revealPage() {
      document.getElementById('page-transition').classList.add('reveal');
    }

    window.addEventListener('load', revealPage);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) revealPage();
    });

    window.addEventListener('pageshow', function(event) {
      const navEntries = performance.getEntriesByType("navigation");
      const isBackNavigation = navEntries.length > 0 && navEntries[0].type === "back_forward";
      if (event.persisted || isBackNavigation) {
        revealPage();
      }
    });

    revealPage();

    // Track read items
    const readItems = new Set(JSON.parse(localStorage.getItem('readItems') || '[]'));

    function markRead(id) {
      readItems.add(id);
      localStorage.setItem('readItems', JSON.stringify([...readItems]));
      checkSecret();
    }

    function checkSecret() {
      if (readItems.has('rescisty') && readItems.has('about') && readItems.has('accomplishments')) {
        document.getElementById('item-secret').classList.add('visible');
      }
    }

    checkSecret();

    function navigate(page) {
      const id = page.replace('.html', '');
      if (id !== 'secret') {
        markRead(id);
      }
      const transition = document.getElementById('page-transition');
      transition.classList.remove('reveal');
      setTimeout(() => window.location.href = page, 700);
    }

    // Physics canvas
    const canvas = document.getElementById('physicsCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9A3C','#00C9A7'];

    const shapes = [];
    const SHAPE_COUNT = 14;

    class Shape {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : -30;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.size = 28 + Math.random() * 55;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.type = Math.floor(Math.random() * 3);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.008;
        this.alpha = 0.55 + Math.random() * 0.35;
        // Autonomous drift — slow sine wave hover
        this.driftAngle = Math.random() * Math.PI * 2;
        this.driftSpeed = 0.004 + Math.random() * 0.004;
        this.driftRadius = 0.25 + Math.random() * 0.3;
      }
    }

    for (let i = 0; i < SHAPE_COUNT; i++) {
      shapes.push(new Shape());
    }

    let mouse = { x: -999, y: -999 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function drawShape(s) {
      ctx.save();
      ctx.globalAlpha = s.alpha;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rotation);
      ctx.fillStyle = s.color;

      if (s.type === 0) {
        ctx.beginPath();
        ctx.arc(0, 0, s.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (s.type === 1) {
        ctx.fillRect(-s.size, -s.size, s.size * 2, s.size * 2);
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -s.size);
        ctx.lineTo(s.size * 0.866, s.size * 0.5);
        ctx.lineTo(-s.size * 0.866, s.size * 0.5);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function update() {
      for (let s of shapes) {
        // Autonomous hover drift
        s.driftAngle += s.driftSpeed;
        s.vx += Math.cos(s.driftAngle) * s.driftRadius * 0.01;
        s.vy += Math.sin(s.driftAngle) * s.driftRadius * 0.01;

        // Cursor repulsion — radius scaled to shape size
        const repulseR = s.size + 40;
        const dx = s.x - mouse.x;
        const dy = s.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < repulseR && dist > 0) {
          const force = (repulseR - dist) / repulseR * 2.2;
          s.vx += (dx / dist) * force;
          s.vy += (dy / dist) * force;
        }

        // Damping — gentle so drift stays alive
        s.vx *= 0.97;
        s.vy *= 0.97;

        s.x += s.vx;
        s.y += s.vy;
        s.rotation += s.rotSpeed;

        // Wall bounce
        const pad = s.size + 5;
        if (s.x < pad) { s.x = pad; s.vx *= -0.6; }
        if (s.x > canvas.width - pad) { s.x = canvas.width - pad; s.vx *= -0.6; }
        if (s.y < pad) { s.y = pad; s.vy *= -0.6; }
        if (s.y > canvas.height - pad) { s.y = canvas.height - pad; s.vy *= -0.6; }

        // Shape collisions using actual size
        for (let other of shapes) {
          if (other === s) continue;
          const ox = s.x - other.x;
          const oy = s.y - other.y;
          const d = Math.sqrt(ox * ox + oy * oy);
          const minD = s.size + other.size;
          if (d < minD && d > 0) {
            const overlap = minD - d;
            const nx = ox / d;
            const ny = oy / d;
            s.x += nx * overlap * 0.5;
            s.y += ny * overlap * 0.5;
            const relV = (s.vx - other.vx) * nx + (s.vy - other.vy) * ny;
            if (relV < 0) {
              s.vx -= relV * nx * 0.4;
              s.vy -= relV * ny * 0.4;
            }
          }
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let s of shapes) drawShape(s);
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });


  </script>
</body>
</html>
