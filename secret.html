<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rescisty — 🤫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-page.css">
  <style>
  *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      cursor: none !important; 
  }
    body { overflow: hidden; }

    #secret-content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      text-align: center;
      padding: 40px;
    }

    .shh-emoji {
      font-size: 80px;
      animation: floatBob 4s ease-in-out infinite;
      display: block;
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .shh-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 200;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.9);
      font-style: italic;
    }

    .shh-sub {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      max-width: 320px;
      line-height: 1.7;
    }

    /* Starfield bg */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #secret-content {
      z-index: 10;
    }

    #topbar { z-index: 20; }

    .secret-line {
      width: 1px;
      height: 60px;
      background: rgba(255,255,255,0.12);
      margin: 0 auto;
    }

    /* Staggered entrance */
    .shh-emoji { animation-delay: 0.3s; }
    .shh-title {
      animation: fadeUp 0.9s cubic-bezier(0.4,0,0.2,1) 0.15s both;
    }
    .shh-sub {
      animation: fadeUp 0.9s cubic-bezier(0.4,0,0.2,1) 0.3s both;
    }
    .secret-line {
      animation: fadeUp 0.9s cubic-bezier(0.4,0,0.2,1) 0.45s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="page-transition"></div>

  <canvas id="stars"></canvas>

  <header id="topbar">
    <a class="wordmark" href="home.html">rescisty</a>
    <a id="back-btn" href="home.html">back</a>
  </header>

  <div id="secret-content">
    <span class="shh-emoji">🤫</span>
    <div class="secret-line"></div>
    <h1 class="shh-title">shh</h1>
    <p class="shh-sub">you read everything.<br>that says something about you.</p>
  </div>

  <script>
    // CRITICAL: Check access IMMEDIATELY before any rendering
    (function() {
      const readItems = new Set(JSON.parse(localStorage.getItem('readItems') || '[]'));
      const hasAccess = readItems.has('rescisty') && readItems.has('about') && readItems.has('accomplishments');
      
      if (!hasAccess) {
        // Hide everything and redirect immediately
        document.documentElement.style.display = 'none';
        window.location.href = 'home.html';
        return;
      }
      
      // Access granted - show everything
      document.documentElement.style.display = '';
    })();

    // Cursor
    const cursor = document.getElementById('custom-cursor');
    window.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // Cursor expansion on hover for interactive elements
    const interactiveElements = document.querySelectorAll('#back-btn, .wordmark');
    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });

    // Entrance reveal - add immediately and on visibility change
    function revealPage() {
      document.getElementById('page-transition').classList.add('reveal');
    }
    
    // Reveal on load
    window.addEventListener('load', revealPage);
    
    // Also reveal if page becomes visible (handles back button)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        revealPage();
      }
    });
    
    // Reveal immediately in case it's already loaded
    revealPage();

    // Back
    document.getElementById('back-btn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('page-transition').classList.remove('reveal');
      setTimeout(() => window.history.back(), 700);
    });

    document.querySelector('.wordmark').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('page-transition').classList.remove('reveal');
      setTimeout(() => window.location.href = 'home.html', 700);
    });

    // Starfield
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.3 + 0.05,
      twinkleOffset: Math.random() * Math.PI * 2
    }));

    let t = 0;
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.twinkleOffset);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha * twinkle})`;
        ctx.fill();
      }
      t += 0.02;
      requestAnimationFrame(drawStars);
    }
    drawStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Reset overlay state when using browser back button
    window.addEventListener('popstate', () => {
      document.getElementById('page-transition').classList.remove('go');
    });
  </script>
</body>
</html>
